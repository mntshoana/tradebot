version: "3"

tasks:
  build:
    desc: Build both the Qt app and the Go sidecar (parallel)
    deps: [build:qt, build:go]

  run:
    desc: Start the Go sidecar, then launch the Qt app
    deps: [run:sidecar]
    cmds:
      - "{{.ROOT_DIR}}/bin/release/tradebot.app/Contents/MacOS/tradebot"

  build:qt:
    desc: Compile the Qt/C++ app via qmake Makefile
    dir: build
    cmds:
      - make -j$(sysctl -n hw.logicalcpu)

  build:go:
    desc: Compile the Go sidecar binary to bin/goserver
    dir: goserver
    cmds:
      - go build -o {{.ROOT_DIR}}/bin/goserver .

  run:sidecar:
    desc: Start the Go sidecar in the background
    cmds:
      - "{{.ROOT_DIR}}/bin/goserver &"
    background: true
