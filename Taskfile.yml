version: "3"

vars:
  EXT:
    sh: 'go env GOEXE'

tasks:
  build:
    desc: Build TradeBot (npm → tsc/vite → go build → bin/tradebot-ui)
    dir: src
    cmds:
      - npm --prefix frontend install --silent
      - npm --prefix frontend run build
      - go build -o {{.ROOT_DIR}}/bin/tradebot-ui{{.EXT}} .

  run:
    desc: Launch TradeBot (Go backend + React UI — single binary)
    deps: [build]
    cmds:
      - "{{.ROOT_DIR}}/bin/tradebot-ui{{.EXT}}"
